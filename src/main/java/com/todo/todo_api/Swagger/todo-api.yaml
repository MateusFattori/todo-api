openapi: 3.0.3
info:
  title: Todo API
  description: API para gerenciamento de tarefas com Spring Boot
  version: "1.0.0"
servers:
  - url: http://localhost:8080/api
paths:
  /todos:
    get:
      summary: Listar tarefas com paginação e filtros
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, in_progress, done]
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high]
        - in: query
          name: sort
          schema:
            type: string
            default: createdAt
        - in: query
          name: order
          schema:
            type: string
            default: asc
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de tarefas paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '404':
          description: Nenhuma tarefa encontrada
        '400':
          description: Parâmetro de página ou limite inválido
components:
  schemas:
    TaskResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date-time
    PaginationResponse:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer
    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TaskResponse'
        pagination:
          $ref: '#/components/schemas/PaginationResponse'