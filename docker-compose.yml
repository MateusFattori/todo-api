version: '3.9'

services:
  api:
    build: .
    container_name: todo_api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - API_PORT=${API_PORT:-8080}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-todo_db}
      - DB_USER=${DB_USER:-todo_user}
      - DB_PASSWORD=${DB_PASSWORD:-todo_password}
    depends_on:
      - postgres
    networks:
      - todo-network

  postgres:
    image: postgres:15
    container_name: todo_postgres
    environment:
      - POSTGRES_DB=${DB_NAME:-todo_db}
      - POSTGRES_USER=${DB_USER:-todo_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-todo_password}
    volumes:
      - todo_pgdata:/var/lib/postgresql/data
    networks:
      - todo-network
    ports:
      - "5432:5432"

networks:
  todo-network:
    driver: bridge

volumes:
  todo_pgdata: